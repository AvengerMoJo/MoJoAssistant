# MoJoAssistant — Development / Test Compose
#
# Usage:
#   docker compose -f docker/docker-compose.dev.yml up
#
# Source is mounted live — edit code on host, server reloads automatically.
# Run tests:
#   docker compose -f docker/docker-compose.dev.yml run --rm mojoassistant-dev \
#     pytest tests/ -v

services:
  mojoassistant-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: mojoassistant:dev
    container_name: mojoassistant-dev
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
      - MOJO_ENV=development
    volumes:
      # Mount source live for hot reload
      - ..:/app
      # Separate dev memory store (don't pollute production ~/.memory)
      - ${HOME}/.memory-dev:/home/mojo/.memory
    networks:
      - mojo-dev-net

  # Run tests as a one-shot service
  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: mojoassistant:dev
    container_name: mojoassistant-test
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
      - MOJO_ENV=test
    volumes:
      - ..:/app
    command: pytest tests/ -v --tb=short
    networks:
      - mojo-dev-net

networks:
  mojo-dev-net:
    driver: bridge
