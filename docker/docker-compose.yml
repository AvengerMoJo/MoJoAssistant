# MoJoAssistant — Docker Compose
#
# Services:
#   mojoassistant      → CPU only (works everywhere)
#   mojoassistant-rocm → AMD GPU via ROCm (requires /dev/kfd)
#   vllm-rocm          → vLLM inference server (ROCm) — shares model caches with host
#
# Shared model volumes (no duplicate downloads):
#   ~/.lmstudio/models          → /models/lmstudio       (GGUF files from LMStudio)
#   ~/.cache/huggingface/hub    → /root/.cache/huggingface/hub (safetensors for vLLM/HF)
#
# Build:
#   docker compose -f docker/docker-compose.yml build
#
# Run (CPU):
#   docker compose -f docker/docker-compose.yml up mojoassistant
#
# Run (AMD ROCm):
#   docker compose -f docker/docker-compose.yml up mojoassistant-rocm
#
# Run vLLM (ROCm):
#   docker compose -f docker/docker-compose.yml up vllm-rocm
#
# Portainer: Stacks → Add Stack → Web editor → paste this file.
# Set any API keys (OPENAI_API_KEY etc.) in Portainer's Environment variables UI.

services:

  # ── Generic CPU ──────────────────────────────────────────────────────────────
  mojoassistant:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      additional_contexts:
        hf-cache: ${HF_HOME:-~/.cache/huggingface}/hub/models--BAAI--bge-m3
    image: mojoassistant:latest
    container_name: mojoassistant
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - MEMORY_PATH=/home/mojo/.memory
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - mojo-memory:/home/mojo/.memory
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - mojo-net

  # ── AMD ROCm ─────────────────────────────────────────────────────────────────
  # Requires: ROCm installed on host, /dev/kfd present, user in render+video groups.
  # HSA_OVERRIDE_GFX_VERSION maps gfx1151 (Strix Halo) to gfx1103 (Phoenix APU).
  # Change this value if you have a different AMD GPU — see Dockerfile.rocm comments.
  mojoassistant-rocm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rocm
      additional_contexts:
        hf-cache: ${HF_HOME:-~/.cache/huggingface}/hub/models--BAAI--bge-m3
    image: mojoassistant:rocm
    container_name: mojoassistant-rocm
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - MEMORY_PATH=/home/mojo/.memory
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-11.0.3}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - mojo-memory-rocm:/home/mojo/.memory
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri/renderD128:/dev/dri/renderD128
    group_add:
      - render
      - video
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - mojo-net

  # ── vLLM Inference Server (ROCm) ───────────────────────────────────────────
  # Shares model caches with the host so GGUF files downloaded by LMStudio and
  # safetensors downloaded by HuggingFace are reused — no duplicate downloads.
  #
  # GGUF models:   --model /models/lmstudio/<publisher>/<model-dir>/<file>.gguf
  # HF models:     --model <hf-repo> (auto-resolved from mounted HF cache)
  #
  # Port 8081 to avoid clashing with LMStudio on 8080.
  vllm-rocm:
    image: vllm/vllm-openai-rocm:latest
    container_name: vllm-rocm
    restart: unless-stopped
    ports:
      - "${VLLM_PORT:-8081}:8000"
    environment:
      - HUGGINGFACE_HUB_CACHE=/root/.cache/huggingface/hub
      - HF_HOME=/root/.cache/huggingface
    volumes:
      # LMStudio GGUF model cache (read-only) — 338 GB shared
      - ${HOME}/.lmstudio/models:/models/lmstudio:ro
      # HuggingFace cache (read-write) — shared with host, avoids re-download
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri/renderD128:/dev/dri/renderD128
    group_add:
      - render
      - video
    # Override at runtime: docker compose run vllm-rocm --model <model-id>
    command: >
      --model qwen/qwen3.6-35b-a3b
      --port 8000
      --max-model-len 32768
      --gpu-memory-utilization 0.90
      --trust-remote-code
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - mojo-net

volumes:
  mojo-memory:
  mojo-memory-rocm:

networks:
  mojo-net:
    driver: bridge
