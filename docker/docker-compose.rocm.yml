# MoJoAssistant — AMD ROCm Compose
#
# Passes /dev/kfd and /dev/dri/renderD128 into the container so
# sentence-transformers can use GPU-accelerated embeddings via PyTorch ROCm.
#
# Requirements on the host:
#   - ROCm installed (rocm-smi should work)
#   - User in 'render' and 'video' groups
#   - /dev/kfd and /dev/dri/renderD128 present
#
# Usage (production):
#   cp .env.example .env
#   docker compose -f docker/docker-compose.rocm.yml up -d mojoassistant-rocm
#
# Usage (dev with hot reload):
#   docker compose -f docker/docker-compose.rocm.yml up mojoassistant-dev-rocm
#
# Run tests:
#   docker compose -f docker/docker-compose.rocm.yml run --rm test-rocm
#
# GPU arch override — HSA_OVERRIDE_GFX_VERSION is baked into the image as 11.0.3
# (gfx1103 / Phoenix APU, closest match for gfx1151 Strix Halo).
# Override here if your GPU is different, e.g.:
#   11.0.0  → gfx1100 (RX 7900 series)
#   11.0.2  → gfx1102 (RX 7600)
#   11.0.3  → gfx1103 (Ryzen 7040 Phoenix APU)

x-rocm-devices: &rocm-devices
  devices:
    - /dev/kfd:/dev/kfd
    - /dev/dri/renderD128:/dev/dri/renderD128
  group_add:
    - render
    - video

services:
  # ── Production ──────────────────────────────────────────────────────────────
  mojoassistant-rocm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rocm
    image: mojoassistant:rocm
    container_name: mojoassistant-rocm
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
      # Uncomment and adjust if your GPU needs a different override:
      # - HSA_OVERRIDE_GFX_VERSION=11.0.0
    volumes:
      - ${HOME}/.memory:/home/mojo/.memory
    <<: *rocm-devices
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - mojo-rocm-net

  # ── Dev (hot reload) ─────────────────────────────────────────────────────────
  mojoassistant-dev-rocm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev.rocm
    image: mojoassistant:dev-rocm
    container_name: mojoassistant-dev-rocm
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
      - MOJO_ENV=development
    volumes:
      - ..:/app
      - ${HOME}/.memory-dev:/home/mojo/.memory
    <<: *rocm-devices
    networks:
      - mojo-rocm-net

  # ── Test runner ──────────────────────────────────────────────────────────────
  test-rocm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev.rocm
    image: mojoassistant:dev-rocm
    container_name: mojoassistant-test-rocm
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
      - MOJO_ENV=test
    volumes:
      - ..:/app
    command: pytest tests/ -v --tb=short
    <<: *rocm-devices
    networks:
      - mojo-rocm-net

networks:
  mojo-rocm-net:
    driver: bridge
