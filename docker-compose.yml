# MoJoAssistant — Quick Start
# For full options see docker/docker-compose.yml and docker/docker-compose.dev.yml
#
# Install:
#   cp .env.example .env     # fill in your API keys
#   docker compose up -d
#
# Dev mode with hot reload:
#   docker compose -f docker/docker-compose.dev.yml up

services:
  mojoassistant:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: mojoassistant:latest
    container_name: mojoassistant
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ${HOME}/.memory:/home/mojo/.memory
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - mojo-net

networks:
  mojo-net:
    driver: bridge
