name: Smoke Test

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-runtime.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2
          restore-keys: hf-

      - name: Install dependencies
        run: |
          pip install -r requirements-runtime.txt
          pip install submodules/dreaming-memory-pipeline/

      - name: Enforce memory/dream ownership boundary
        run: |
          python scripts/check_memory_dream_ownership.py

      - name: Config doctor gate (error-only)
        env:
          ENVIRONMENT: ci
          EMBEDDING_MODEL: all-MiniLM-L6-v2
          MEMORY_PATH: /tmp/mojo-doctor-ci
          PYTHONPATH: ${{ github.workspace }}
          LOG_LEVEL: WARNING
        run: |
          python3 - <<'PY'
          import json
          import sys
          from app.config.doctor import ConfigDoctor

          report = ConfigDoctor().run_all_checks().to_dict()
          status = report.get("status")
          summary = report.get("summary", {}) or {}
          errors = int(summary.get("errors", 0) or 0)

          print(json.dumps({
              "status": status,
              "summary": summary,
              "error_count": errors,
          }, indent=2))

          if status == "error" or errors > 0:
              print("\n--- ERROR CHECKS ---")
              for c in report.get("checks", []):
                  if c.get("status") == "error":
                      print(json.dumps(c, indent=2))
              print("Config doctor gate failed: errors detected.")
              sys.exit(1)
          PY

      - name: Start server
        env:
          MCP_REQUIRE_AUTH: "false"
          ENVIRONMENT: ci
          EMBEDDING_MODEL: all-MiniLM-L6-v2
          MEMORY_PATH: /tmp/mojo-memory-ci
          PYTHONPATH: ${{ github.workspace }}
          LOG_LEVEL: WARNING
        run: |
          python unified_mcp_server.py --mode http --port 8000 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for /health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo ""
              echo "Server is healthy"
              exit 0
            fi
            echo "Attempt $i/30 — waiting 3s..."
            sleep 3
          done
          echo "Server did not become healthy within 90s"
          exit 1

      - name: Assert health response
        run: |
          curl -sf http://localhost:8000/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') == 'healthy', f'Expected status=healthy, got: {d}'
          assert 'uptime' in d, f'Missing uptime field: {d}'
          print('OK:', d)
          "

      - name: MCP surface smoke test
        env:
          ENVIRONMENT: ci
          EMBEDDING_MODEL: all-MiniLM-L6-v2
          MEMORY_PATH: /tmp/mojo-smoke-ci
          PYTHONPATH: ${{ github.workspace }}
          LOG_LEVEL: WARNING
        run: |
          pip install pytest
          python -m pytest tests/integration/test_mcp_surface_smoke.py -v --tb=short

      - name: Stable Smoke Suite Gate
        env:
          ENVIRONMENT: ci
          EMBEDDING_MODEL: all-MiniLM-L6-v2
          MEMORY_PATH: /tmp/mojo-smoke-stable-ci
          PYTHONPATH: ${{ github.workspace }}
          LOG_LEVEL: WARNING
        run: |
          python -m pytest tests/smoke/ -m stable -q --tb=short

      - name: Conformance Suite Gate
        env:
          ENVIRONMENT: ci
          EMBEDDING_MODEL: all-MiniLM-L6-v2
          MEMORY_PATH: /tmp/mojo-conformance-ci
          PYTHONPATH: ${{ github.workspace }}
          LOG_LEVEL: WARNING
        run: |
          python -m pytest tests/conformance -q --tb=short

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true
