name: Smoke Test

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-runtime.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2
          restore-keys: hf-

      - name: Install dependencies
        run: |
          pip install -r requirements-runtime.txt
          pip install submodules/dreaming-memory-pipeline/

      - name: Start server
        env:
          MCP_REQUIRE_AUTH: "false"
          ENVIRONMENT: ci
          EMBEDDING_MODEL: all-MiniLM-L6-v2
          MEMORY_PATH: /tmp/mojo-memory-ci
          PYTHONPATH: ${{ github.workspace }}
          LOG_LEVEL: WARNING
        run: |
          python unified_mcp_server.py --mode http --port 8000 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for /health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo ""
              echo "Server is healthy"
              exit 0
            fi
            echo "Attempt $i/30 — waiting 3s..."
            sleep 3
          done
          echo "Server did not become healthy within 90s"
          exit 1

      - name: Assert health response
        run: |
          curl -sf http://localhost:8000/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') == 'healthy', f'Expected status=healthy, got: {d}'
          assert 'uptime' in d, f'Missing uptime field: {d}'
          print('OK:', d)
          "

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true
